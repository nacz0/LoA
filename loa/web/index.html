<!doctype html>
<html lang="pl">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>LoA</title>
    <link rel="stylesheet" href="/style.css">
  </head>
  <body>
    <header class="topbar">
      <div>
        <h1>LoA</h1>
        <p id="serverLine">Lokalni agenci AI</p>
      </div>
      <div class="status" id="statusBadge">Sprawdzanie</div>
    </header>

    <main class="layout">
      <aside class="sidebar" aria-label="Panel agentow">
        <section class="panel">
          <div class="panel-title">
            <h2>Agenci</h2>
            <button class="icon-button" id="newAgentButton" title="Nowy agent">+</button>
          </div>
          <div id="agentList" class="list"></div>
        </section>

        <section class="panel">
          <div class="panel-title">
            <h2>Edytor</h2>
            <button class="icon-button" id="refreshButton" title="Odswiez">R</button>
          </div>
          <form id="agentForm" class="agent-form">
            <label>
              Nazwa
              <input id="agentNameInput" name="name" autocomplete="off" required>
            </label>
            <label>
              Provider
              <select id="providerSelect" name="provider" required></select>
            </label>
            <label>
              Model
              <input id="modelInput" name="model" list="modelOptions" required>
              <datalist id="modelOptions"></datalist>
            </label>
            <label>
              System
              <textarea id="systemInput" name="system" rows="4"></textarea>
            </label>
            <div class="form-grid">
              <label>
                Temp
                <input id="temperatureInput" name="temperature" type="number" min="0" max="2" step="0.1">
              </label>
              <label>
                Max
                <input id="maxTokensInput" name="max_tokens" type="number" min="1" step="1">
              </label>
            </div>
            <div class="form-actions">
              <button type="submit">Zapisz</button>
              <button type="button" class="secondary-button" id="deleteAgentButton">Usun</button>
            </div>
          </form>
        </section>

        <section class="panel">
          <div class="panel-title">
            <h2>Providery</h2>
            <button class="icon-button" id="newProviderButton" title="Nowy provider">+</button>
          </div>
          <div id="providerList" class="list"></div>
          <form id="providerForm" class="agent-form compact-form">
            <label>
              Nazwa
              <input id="providerNameInput" name="name" autocomplete="off" required>
            </label>
            <label>
              Typ
              <select id="providerTypeInput" name="type" required>
                <option value="ollama">ollama</option>
                <option value="openai-compatible">openai-compatible</option>
              </select>
            </label>
            <label>
              Base URL
              <input id="providerBaseUrlInput" name="base_url" autocomplete="off" placeholder="http://192.168.1.40:8765/v1" required>
            </label>
            <label>
              API key
              <input id="providerApiKeyInput" name="api_key" autocomplete="off" placeholder="opcjonalnie">
            </label>
            <label>
              Timeout
              <input id="providerTimeoutInput" name="timeout_seconds" type="number" min="1" step="1">
            </label>
            <div class="form-actions">
              <button type="submit">Zapisz</button>
              <button type="button" class="secondary-button" id="deleteProviderButton">Usun</button>
            </div>
          </form>
        </section>

        <section class="panel">
          <div class="panel-title">
            <h2>Node'y</h2>
            <button class="icon-button" id="newNodeButton" title="Nowy node">+</button>
          </div>
          <div id="nodeList" class="list"></div>
          <form id="nodeForm" class="agent-form compact-form">
            <label>
              Nazwa
              <input id="nodeNameInput" name="name" autocomplete="off" required>
            </label>
            <label>
              URL
              <input id="nodeUrlInput" name="url" autocomplete="off" placeholder="http://192.168.1.40:8765" required>
            </label>
            <label>
              Token
              <input id="nodeTokenInput" name="token" autocomplete="off" placeholder="zostaw puste, aby zachowac">
            </label>
            <div class="form-grid">
              <label>
                Waga
                <input id="nodeWeightInput" name="weight" type="number" min="1" step="1">
              </label>
              <label class="checkbox-label">
                <input id="nodeEnabledInput" name="enabled" type="checkbox">
                Aktywny
              </label>
            </div>
            <label>
              Role
              <input id="nodeRolesInput" name="roles" autocomplete="off" placeholder="chat, code">
            </label>
            <div class="form-actions">
              <button type="submit">Zapisz</button>
              <button type="button" class="secondary-button" id="deleteNodeButton">Usun</button>
            </div>
          </form>
        </section>
      </aside>

      <section class="chat-shell" aria-label="Czat">
        <div class="chat-head">
          <div>
            <label for="agentSelect">Agent</label>
            <select id="agentSelect"></select>
          </div>
          <button id="clearButton" class="secondary-button">Wyczysc</button>
        </div>

        <div id="messages" class="messages" aria-live="polite"></div>

        <form id="chatForm" class="composer">
          <textarea id="messageInput" rows="3" placeholder="Napisz wiadomosc"></textarea>
          <button id="sendButton" type="submit">Wyslij</button>
        </form>
      </section>
    </main>

    <script src="/app.js"></script>
  </body>
</html>
